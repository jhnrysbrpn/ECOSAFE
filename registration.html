<!DOCTYPE html>
<html>
<head>
    <title>Vendor Registration</title>
</head>

<body>

    <h2>Public Market Vendor Registration</h2>

    <form>

        <!-- Vendor Details -->
        <h3>Vendor Details</h3>

        <label>Business Name:</label><br>
        <input type="text" name="business_name"><br><br>

        <label>Product Type:</label><br>
        <select name="product_type">
            <option>Fish</option>
            <option>Fruits</option>
            <option>Meat</option>
            <option>Vegetables</option>
        </select><br><br>

        <label>Permit Number:</label><br>
        <input type="text" name="permit_number"><br><br>

        <h3>Compliance Check</h3>
        <label>Sanitary Practices:</label><br>
        <input type="radio" name="sanitary" value="Good"> Good<br>
        <input type="radio" name="sanitary" value="Fair"> Fair<br>
        <input type="radio" name="sanitary" value="Poor"> Poor<br><br>

        <label>Stall Cleanliness:</label><br>
        <input type="checkbox" name="cleanliness" value="Daily Cleaning"> Daily Cleaning<br>
        <input type="checkbox" name="cleanliness" value="Waste Disposal"> Waste Disposal<br><br>

        <input type="submit" value="Submit">

    </form>

    <br>
    <a href="survey.html">Click this to answer the Disaster Preparedness Survey</a>

</body>
</html>
